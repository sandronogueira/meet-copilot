<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Meet Copilot — Permitir microfone</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #05080a;
        color: #eaf3f6;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      .card { max-width: 420px; padding: 2rem; }
      h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
      p { color: #9db4bd; font-size: 0.95rem; line-height: 1.5; }
      button {
        margin-top: 1.2rem;
        font: inherit;
        font-weight: 700;
        padding: 0.8rem 1.6rem;
        border-radius: 8px;
        border: 0;
        background: #2de1fd;
        color: #032a33;
        cursor: pointer;
      }
      #status { margin-top: 1rem; font-size: 0.9rem; min-height: 1.4em; }
      .ok { color: #2de1fd; }
      .err { color: #ff6b6b; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎙️ Permitir microfone do Meet Copilot</h1>
      <p>
        Para transcrever a <strong>sua</strong> voz na reunião, a extensão precisa de acesso ao
        microfone. Clique abaixo e escolha <strong>Permitir</strong> no aviso do Chrome.
      </p>
      <button id="btn">Permitir microfone</button>
      <p id="status"></p>
    </div>
    <script src="mic-permission.js"></script>
  </body>
</html>
