<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Meet Copilot</title>
    <style>
      :root {
        --bg: #05080a;
        --fg: #eaf3f6;
        --dim: #9db4bd;
        --accent: #2de1fd;
        --line: rgba(148, 210, 230, 0.18);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.65rem 0.9rem;
        border-bottom: 1px solid var(--line);
        flex-shrink: 0;
      }
      .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 0.9rem; }
      .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
      button {
        font: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.45rem 0.9rem;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--fg);
        cursor: pointer;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #032a33; }
      button:disabled { opacity: 0.5; cursor: default; }
      /* Home: coluna única alinhada à esquerda, ritmo vertical consistente */
      #home { flex: 1; overflow-y: auto; padding: 2.2rem 1.4rem 1.6rem; }
      .home-inner { max-width: 360px; margin: 0 auto; }
      #home h1 {
        font-size: 1.32rem;
        line-height: 1.32;
        letter-spacing: -0.01em;
        margin-bottom: 0.65rem;
      }
      #home .sub {
        color: var(--dim);
        font-size: 0.85rem;
        line-height: 1.6;
        margin-bottom: 1.7rem;
      }
      #setup {
        display: none;
        text-align: left;
        background: #0b1116;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 1.15rem;
        margin-bottom: 1.4rem;
      }
      #setup.on { display: block; }
      .field + .field { margin-top: 1.05rem; }
      #setup label {
        display: block;
        font-size: 0.64rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 0.45rem;
      }
      #setup select {
        width: 100%;
        font: inherit;
        font-size: 0.84rem;
        line-height: 1.4;
        padding: 0.62rem 0.7rem;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #05080a;
        color: var(--fg);
      }
      #setup select:focus { outline: none; border-color: var(--accent); }
      #setup textarea {
        width: 100%;
        font: inherit;
        font-size: 0.84rem;
        line-height: 1.5;
        padding: 0.62rem 0.7rem;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #05080a;
        color: var(--fg);
        resize: vertical;
        min-height: 4.4rem;
      }
      #setup textarea:focus { outline: none; border-color: var(--accent); }
      #setup textarea::placeholder { color: var(--dim); }
      #setup .hint {
        font-size: 0.74rem;
        line-height: 1.6;
        color: var(--dim);
        margin-top: 1.05rem;
      }
      #btn-start { width: 100%; padding: 0.8rem 1rem; font-size: 0.88rem; }
      #btn-login { width: 100%; padding: 0.7rem 1rem; margin-top: 0.7rem; }
      #status {
        font-size: 0.76rem;
        line-height: 1.6;
        color: var(--dim);
        margin-top: 1.1rem;
        min-height: 1.3em;
        text-align: left;
      }
      #frame { flex: 1; border: 0; width: 100%; display: none; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <span class="brand"><span class="dot"></span> Meet Copilot</span>
      <span style="display: flex; gap: 0.5rem">
        <button
          id="btn-collapse"
          class="hidden"
          title="Recolhe o painel para compartilhar a tela — a gravação continua. Reabra pelo ícone da extensão."
        >
          Recolher
        </button>
        <button id="btn-stop" class="hidden">Encerrar</button>
      </span>
    </header>

    <div id="home">
      <div class="home-inner">
        <h1>Entre sem saber nada.<br />Saia como especialista.</h1>
        <p class="sub">Abra a aba da sua reunião do Google Meet e inicie o copiloto.</p>
        <div id="setup">
          <div class="field">
            <label for="sel-base">Base de conhecimento</label>
            <select id="sel-base"></select>
          </div>
          <div class="field">
            <label for="sel-expert">Clone que vai escutar</label>
            <select id="sel-expert"></select>
          </div>
          <div class="field">
            <label for="quick-context">Contexto rápido desta reunião (opcional)</label>
            <textarea
              id="quick-context"
              placeholder="Cole aqui algo sobre o cliente, a oportunidade, o que já foi conversado… O copiloto já entra sabendo."
            ></textarea>
          </div>
          <p class="hint">A base dá o contexto salvo; o campo acima entra só nesta reunião. O clone pode ser trocado durante a call.</p>
        </div>
        <button id="btn-start" class="primary">Iniciar copiloto nesta reunião</button>
        <button id="btn-login" class="hidden">Fazer login no Meet Copilot</button>
        <p id="status"></p>
      </div>
    </div>

    <iframe id="frame" allow="clipboard-write"></iframe>

    <script src="panel.js"></script>
  </body>
</html>
